project_id = "habit-pet"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://cursor-hackathon-flame.vercel.app"
additional_redirect_urls = [
  "http://127.0.0.1:3000/**",
  "http://localhost:3000/**",
  "https://cursor-hackathon-flame.vercel.app/**",
  "https://cursor-hackathon-*-harkamal-randhawas-projects.vercel.app/**",
  "https://cursor-hackathon-*-recentrunner-harkamal-randhawas-projects.vercel.app/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[realtime]
enabled = true

[analytics]
enabled = false
